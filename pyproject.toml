[tool.pyright]

pythonVersion = "3.13"
pythonPlatform = "All"
typeCheckingMode = "strict"

# reportMissingTypeStubs = false

[tool.ruff]

exclude = [".git", "conda", "data"]
line-length = 240
target-version = "py313"

[tool.ruff.lint]

select = [
    # "D",      # pydocstyle
    # "PTH",    # fla@ext:tamasfe.even-better-tomlvet
    "CPY",    # flake8-copyright
    "T20",    # flake8-print
    "C90",    # mccabe
    "F",      # pyflakes
    "E",      # pycodestyle error
    "W",      # pycodestyle warning
    "I",      # isort
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "YTT",    # flake8-2020
    "ANN",    # flake8-annotations
    "ASYNC",  # flake8-async
    "ASYNC1", # flake8-trio
    "S",      # flake8-bandit
    "BLE",    # flake8-blind-except
    "FBT",    # flake8-boolean-trap
    "B",      # flake8-bugbear
    "A",      # flake8-builtins
    "COM",    # flake8-commas
    "C4",     # flake8-comprehensions
    "DTZ",    # flake8-datetimez
    "T10",    # flake8-debugger
    "DJ",     # flake8-django
    "EM",     # flake8-errmsg
    "EXE",    # flake8-executable
    "FA",     # flake8-future-annotations
    "ISC",    # flake8-implicit-str-concat
    "ICN",    # flake8-import-conventions
    "G",      # flake8-logging-format
    "INP",    # flake8-no-pep420
    "PIE",    # flake8-pie
    "PYI",    # flake8-pyi
    "PT",     # flake8-pytest-style
    "Q",      # flake8-quotes
    "RSE",    # flake8-raise
    "RET",    # flake8-return
    "SLF",    # flake8-self
    "SLOT",   # flake8-slots
    "SIM",    # flake8-simplify
    "TID",    # flake8-tidy-imports
    "TC",     # flake8-type-checking
    "INT",    # flake8-gettext
    "ARG",    # flake8-unused-arguments
    "PGH",    # pygrep-hooks
    "PL",     # pylint
    "TRY",    # tryceratops
    "FLY",    # flynt
    "NPY",    # numpy-specific rules
    "AIR",    # airflow
    "PERF",   # perflint
    "FURB",   # refurb
    "RUF",    # ruff-specific rules
]
ignore = [
    "T201",    # 'print' found
    "ANN401",  # Dynamically typed expressions (typing.Any) are disallowed
    "FBT001",  # Boolean-typed positional argument in function definition
    "FBT002",  # Boolean default positional argument in function definition
    "FBT003",  # Boolean positional value in function call
    "PLR0913", # Too many arguments in function definition
    "TC006",   # Add quotes to type expression in 'typing.cast()'
    "RET503",  # Missing explicit 'return' at the end of function able to return non-'None' value
    "RET502",  # Do not implicitly 'return None' in function able to return non-'None' value
    # "A001",    # Variable is shadowing a Python builtin
    # "A006",    # Lambda argument is shadowing a Python builtin
    # "B008",    # Do not perform function call in argument defaults; instead, perform the call within the function, or read the default from a module-level singleton variable
    # "D203",    # blank line required before class docstring
    # "D213",    # multi-line docstring summary should start at the second line
    # "D401",    # First line of docstring should be in imperative mood
    # "D407",    # Missing dashed underline after section
    # "D413",    # Missing blank line after last section
    # "B905",    # 'zip()' without an explicit 'strict=' parameter
    # "EM102",   # Exception must not use an f-string literal, assign to variable first
    # "TRY003",  # Avoid specifying long messages outside the exception class
    # "PLC0414", # Import alias does not rename original package
    # "PLR2004", # Magic value used in comparison, consider replacing it with a constant variable
    # "PLW0642", # Reassigned 'self' variable in instance method
    # "G004",    # Logging statement uses f-string
    # "SIM105",  # Use 'contextlib.suppress(ValueError)' instead of 'try'-'except'-'pass'
]

[tool.ruff.format]

docstring-code-format = true
docstring-code-line-length = "dynamic"
